<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500&family=Inter:wght@400;500&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="wrapper">
        <header>
          <img src="images/cafe.png" alt="Cafe photo" class="cafe-logo">
            <nav>
              <a href="#menu">Menu</a>
              <a href="#about">About us</a>
              <a href="#contact">Contact</a>
            </nav>
            <div class="social-media-box">
                <a href="https://www.google.com/maps?q=Café+Franca+Hiltenspergerstraße+24+München" target="_blank" style="text-decoration: none; display: flex; align-items: center">
                    <img class="location-logo" src="images/location.png" alt="location">
                    <span class="location-text">Hiltenspergerstraße 24, München</span>
                </a>
                <a href="">
                    <img class="tiktok" src="images/tiktok.png" alt="TikTok">
                </a>
                <a href="">
                    <img class="insta" src="images/Instagram_icon.png" alt="Instagram">
                </a>
                <a href="">
                    <img class="facebook" src="images/Facebook_logo_(square).png" alt="Facebook">
                </a>
            </div>
          </header>
        <div class="info">
            <img class="coffee-with-food" src="images/coffee-with-food.png" alt="food with coffee">
            <div class="gradient"></div>
            <div class="welcome-wrapper">
                <div class="welcome-window">
                    <p class="welcome-to">welcome to</p>
                    <p class="welcome-name">Café Franca</p>
                    <p class="welcome-description">A cozy place where every cup<br>of coffee is a small ritual.</p>
                   <div class="welcome-btns">
                       <button class="menu-btn">view menu</button>
                       <button class="about-btn">about us</button>
                   </div>
                </div>
            </div>
        </div>
    </div>
    <script>

    </script>
</body>
</html>
